name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

jobs:
  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run SpotBugs
      run: ./gradlew spotbugsMain

    - name: Upload SpotBugs reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: spotbugs-reports
        path: '**/build/reports/spotbugs/**'

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache NVD Database
      uses: actions/cache@v6
      with:
        path: ~/.gradle/dependency-check-data
        key: nvd-${{ hashFiles('**/build.gradle.kts') }}
        restore-keys: |
          nvd-

    # Update the NVD data on its own, tolerating transient NVD 503s. The OWASP
    # plugin treats an NVD update failure during analysis as a FATAL error that
    # bypasses failOnError, so we must NOT update during analysis (autoUpdate is
    # false in build.gradle.kts). This best-effort step refreshes the cached NVD
    # database when NVD is reachable and is allowed to fail when it isn't — the
    # analysis below then runs against whatever cached data exists.
    - name: Update NVD database (best-effort)
      continue-on-error: true
      run: ./gradlew :core:dependencyCheckUpdate --no-configuration-cache --no-parallel --stacktrace
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    # Gate the analysis on real data: a populated NVD database is hundreds of MB.
    # If none exists (cold cache + NVD outage), fail loudly instead of running an
    # empty scan that would pass with "no vulnerabilities" — "no data" is not
    # "no vulns".
    - name: Verify NVD database is present
      run: |
        db="$(find ~/.gradle/dependency-check-data -name 'odc.mv.db' -size +50M 2>/dev/null | head -n 1)"
        if [ -z "$db" ]; then
          echo "::error::NVD database missing or unpopulated — cannot scan against real vulnerability data (likely an NVD outage on a cold cache). Failing the security gate rather than passing without data."
          find ~/.gradle/dependency-check-data -name 'odc.mv.db' -exec ls -lh {} + 2>/dev/null || echo "  (no odc.mv.db found at all)"
          exit 1
        fi
        echo "NVD database present and populated: $db ($(du -h "$db" | cut -f1))"

    - name: Run OWASP Dependency-Check
      # autoUpdate is disabled (build.gradle.kts) so analysis never contacts NVD
      # and a transient 503 can't fail it — it scans the cached database verified
      # above and enforces the failBuildOnCVSS gate.
      # --no-configuration-cache: the OWASP Analyze task serializes Project and is
      #   not configuration-cache compatible (cache is enabled globally).
      # --no-parallel: dependencyCheckAll fans analyze across modules; with
      #   org.gradle.parallel=true they race on the shared NVD H2 dir
      #   ("connectionPool is null"). Serialize so one pool owns the data store.
      run: ./gradlew dependencyCheckAll --no-configuration-cache --no-parallel --stacktrace
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload Dependency-Check reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: dependency-check-reports
        path: '**/build/reports/dependency-check-report.html'
