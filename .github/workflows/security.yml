name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

jobs:
  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run SpotBugs
      run: ./gradlew spotbugsMain

    - name: Upload SpotBugs reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: spotbugs-reports
        path: '**/build/reports/spotbugs/**'

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache NVD Database
      uses: actions/cache@v5
      with:
        path: ~/.gradle/dependency-check-data
        key: nvd-${{ hashFiles('**/build.gradle.kts') }}
        restore-keys: |
          nvd-

    - name: Run OWASP Dependency-Check
      # --no-configuration-cache: the OWASP Analyze task serializes Project and is
      #   not configuration-cache compatible; the cache is enabled globally in
      #   gradle.properties, so without this the task fails on every cache miss.
      # --no-parallel: dependencyCheckAll fans out dependencyCheckAnalyze across
      #   all modules. With org.gradle.parallel=true they race on the single
      #   shared NVD H2 data dir, producing "connectionPool is null" NPEs. Run
      #   the analysis serially so one connection pool owns the data store.
      # --stacktrace: surface the underlying NVD/DB cause in CI logs on failure.
      run: ./gradlew dependencyCheckAll --no-configuration-cache --no-parallel --stacktrace
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Verify NVD database was actually scanned
      # failOnError=false (build.gradle.kts) lets the analysis fall back to cached
      # NVD data during a transient NVD 503, so the CVSS gate keeps working. The
      # risk is a cold/empty cache silently passing with nothing to scan. Guard
      # against that: a real NVD database is hundreds of MB; fail the job if no
      # populated odc.mv.db exists, so "no data" never counts as "no vulns".
      run: |
        db="$(find ~/.gradle/dependency-check-data -name 'odc.mv.db' -size +50M 2>/dev/null | head -n 1)"
        if [ -z "$db" ]; then
          echo "::error::NVD database missing or unpopulated — dependency-check did not scan against real vulnerability data (likely NVD outage on a cold cache). Failing the security gate."
          find ~/.gradle/dependency-check-data -name 'odc.mv.db' -exec ls -lh {} + 2>/dev/null || echo "  (no odc.mv.db found at all)"
          exit 1
        fi
        echo "NVD database present and populated: $db ($(du -h "$db" | cut -f1))"

    - name: Upload Dependency-Check reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: dependency-check-reports
        path: '**/build/reports/dependency-check-report.html'
