name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

jobs:
  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run SpotBugs
      run: ./gradlew spotbugsMain

    - name: Upload SpotBugs reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: spotbugs-reports
        path: '**/build/reports/spotbugs/**'

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # A deactivated NVD key is indistinguishable from an NVD outage in the update
    # step: per NVD docs an invalid/deactivated key gets HTTP 404; some states
    # instead silently fall back to the anonymous 5-req/30s budget, turning the
    # sync into a crawl that hits the 20-min cap. Probe both signals before the
    # expensive step: (a) any 404 on a known-valid URL = key rejected; (b) a
    # 10-request burst (over the anonymous budget, within the keyed 50/30s
    # budget) must not be throttled. 503s = NVD outage -> warn, not fail (the
    # cached-DB path below handles outages).
    - name: Verify NVD API key is honored
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: |
        if [ -z "$NVD_API_KEY" ]; then
          echo "::error::NVD_API_KEY secret is empty/unset — NVD updates would run at the anonymous 5-req/30s rate and time out. Set the secret."
          exit 1
        fi
        url="https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=1"
        ok=0; rejected=0; throttled=0; other=0
        for i in $(seq 1 10); do
          code=$(curl -s -o /dev/null --max-time 10 -w '%{http_code}' -H "apiKey: $NVD_API_KEY" "$url")
          case "$code" in
            200) ok=$((ok+1)) ;;
            404) rejected=$((rejected+1)) ;;      # invalid/deactivated key (NVD-documented)
            403|429) throttled=$((throttled+1)) ;; # anonymous-budget throttle = key not honored
            *) other=$((other+1)) ;;               # 503/000: NVD-side, not the key
          esac
        done
        echo "NVD key probe: ok=$ok rejected=$rejected throttled=$throttled other=$other (of 10)"
        if [ "$rejected" -gt 0 ]; then
          echo "::error::NVD returned 404 for a valid query with the API key set — the key is invalid or deactivated. Recover/rotate NVD_API_KEY (https://nvd.nist.gov/developers/request-an-api-key)."
          exit 1
        fi
        if [ "$throttled" -ge 2 ]; then
          echo "::error::NVD throttled a 10-request burst within the keyed 50/30s budget — the key is not being honored (likely deactivated for inactivity). Recover/rotate NVD_API_KEY."
          exit 1
        fi
        if [ "$throttled" -eq 1 ]; then
          echo "::warning::One throttled response in the burst — possibly transient NVD-side throttling; key not conclusively at fault."
        fi
        if [ "$ok" -eq 0 ]; then
          echo "::warning::No 200s from NVD (other=$other — likely a transient outage). Key not confirmed; continuing to the cached-DB path."
        else
          echo "NVD API key honored ($ok/10 succeeded)."
        fi

    - name: Cache NVD Database
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ~/.gradle/dependency-check-data
        key: nvd-${{ hashFiles('**/build.gradle.kts') }}
        restore-keys: |
          nvd-

    # Update the NVD data on its own, tolerating transient NVD 503s. The OWASP
    # plugin treats an NVD update failure during analysis as a FATAL error that
    # bypasses failOnError, so we must NOT update during analysis (autoUpdate is
    # false in build.gradle.kts). This best-effort step refreshes the cached NVD
    # database when NVD is reachable and is allowed to fail when it isn't — the
    # analysis below then runs against whatever cached data exists.
    - name: Update NVD database (best-effort)
      continue-on-error: true
      # Cap the refresh so a genuinely hung NVD API can't run to the 6h job limit.
      # Sized to fit a cold full sync with an API key; if it is still killed, the
      # "Release stale OWASP write lock" step below cleans up so analysis is never
      # wedged. Do NOT use --no-daemon here: it forks a single-use daemon that,
      # when the step is killed on timeout, is orphaned while still holding
      # odc.update.lock — which then blocks the analyze step for 40 minutes.
      timeout-minutes: 20
      run: ./gradlew :core:dependencyCheckUpdate --no-configuration-cache --no-parallel --stacktrace
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    # If the update above was killed (timeout) or crashed mid-run it can leave
    # odc.update.lock behind. OWASP DC reads that lock file's timestamp and waits
    # 160 × 15s = 40 min before giving up, wedging the analysis into a 40-minute
    # failure ("WriteLockException: Unable to obtain the update lock"). No DC
    # process runs between steps, so removing a leftover lock here is always safe
    # and lets analysis start clean. Verified locally: a stale lock file stalls
    # `dependencyCheckAnalyze`; deleting it makes the same task pass in seconds.
    - name: Release stale OWASP write lock
      if: always()
      run: rm -f ~/.gradle/dependency-check-data/*/odc.update.lock

    # Gate the analysis on real data: a populated NVD database is hundreds of MB.
    # If none exists (cold cache + NVD outage), fail loudly instead of running an
    # empty scan that would pass with "no vulnerabilities" — "no data" is not
    # "no vulns".
    - name: Verify NVD database is present
      run: |
        db="$(find ~/.gradle/dependency-check-data -name 'odc.mv.db' -size +50M 2>/dev/null | head -n 1)"
        if [ -z "$db" ]; then
          echo "::error::NVD database missing or unpopulated — cannot scan against real vulnerability data (likely an NVD outage on a cold cache). Failing the security gate rather than passing without data."
          find ~/.gradle/dependency-check-data -name 'odc.mv.db' -exec ls -lh {} + 2>/dev/null || echo "  (no odc.mv.db found at all)"
          exit 1
        fi
        echo "NVD database present and populated: $db ($(du -h "$db" | cut -f1))"

    - name: Run OWASP Dependency-Check
      # autoUpdate is disabled (build.gradle.kts) so analysis never contacts NVD
      # and a transient 503 can't fail it — it scans the cached database verified
      # above and enforces the failBuildOnCVSS gate.
      # --no-configuration-cache: the OWASP Analyze task serializes Project and is
      #   not configuration-cache compatible (cache is enabled globally).
      # --no-parallel: dependencyCheckAll fans analyze across modules; with
      #   org.gradle.parallel=true they race on the shared NVD H2 dir
      #   ("connectionPool is null"). Serialize so one pool owns the data store.
      run: ./gradlew dependencyCheckAll --no-configuration-cache --no-parallel --stacktrace
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload Dependency-Check reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: dependency-check-reports
        path: '**/build/reports/dependency-check-report.html'
