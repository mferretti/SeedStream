# Regex types used by the E2E regex benchmark (benchmarks/run_regex_e2e.sh).
#
# Each pattern shape is also measured in isolation by DatafakerRegexTypeBenchmark; this file drives
# the same shapes through the full generate → serialize → write pipeline so the micro numbers can be
# checked against a real throughput figure.
#
# Use with:  cli execute --job config/jobs/e2e_regex_file_json.yaml \
#              --faker-types config/datafaker-types.regex-bench.yaml

types:
  # Literal prefix + fixed-width digits — the common "sequence ID" shape
  bench_order_ref: "regex:ORD-\\d{8}"

  # Bounded character class, variable length — ISO 20022 MsgId shape
  bench_msg_id: "regex:[A-Z0-9]{10,35}"

  # Alternation — document type discriminator
  bench_doc_type: "regex:(INV|CRN|DBN)-[0-9]{6}"

  # Long structured pattern — IBAN-shaped creditor reference
  bench_creditor_ref: "regex:[A-Z]{2}\\d{2}[A-Z0-9]{4}\\d{7}([A-Z0-9]?){0,16}"
