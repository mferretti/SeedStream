# End-to-End Benchmark: Passport → Kafka → CSV
# Used for E2E performance testing with different thread/memory configurations

source: passport.yaml
type: kafka
seed:
  type: embedded
  value: 42
conf:
  bootstrap: localhost:9092
  topic: benchmark-topic
  sync: false
  acks: "1"
  batch_size: 65536
  linger_ms: 20
  compression: snappy
