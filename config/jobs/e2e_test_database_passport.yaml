# End-to-End Test: Passport → Database
# Credentials below are well-known local test values for the E2E PostgreSQL container.
# Not real secrets — never used in production environments.
source: passport.yaml
type: database
seed:
  type: embedded
  value: 42
conf:
  jdbc_url: "jdbc:postgresql://localhost:5432/testdb"
  username: "testuser"
  password: "testpass"  # local e2e test credential — not a real secret  # gitleaks:allow
  table: "passports"
  batch_size: 1000
  pool_size: 5
  transaction_strategy: per_batch
