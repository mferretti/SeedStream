name: invoice
geolocation: italy
data:
  id:
    datatype: int[1..9999999]
  invoice_number:
    datatype: int[1..999999]
  invoice_date:
    datatype: date[2024-01-01..2026-12-31]
  issuer:
    datatype: object[company]
  recipient:
    datatype: object[company]
  line_items:
    datatype: array[object[line_item], 1..10]
  gross_total:
    datatype: decimal[10.00..50000.00]
  total_vat:
    datatype: decimal[1.00..10000.00]
  net_total:
    datatype: decimal[9.00..45000.00]
