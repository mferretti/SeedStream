name: lib_magazine_sale
data:
  id:
    datatype: int[1..100000]
  sale_date:
    datatype: date[2015-01-01..2025-12-31]
  issue_number:
    datatype: int[1..500]
  quantity:
    datatype: int[1..20]
  unit_price:
    datatype: decimal[1.99..29.99]
  channel:
    datatype: enum[ONLINE,IN_STORE,SUBSCRIPTION]
  customer_name:
    datatype: full_name
  magazine_id:
    datatype: ref[parent.id]
